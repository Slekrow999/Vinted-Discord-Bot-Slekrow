version: '3.8'

services:
  # ------------------------------------------------------------------
  # THE VPN GATEWAY (Gluetun)
  # ------------------------------------------------------------------
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=iMK6j66Si3iAvCe9Q4XZwYgg
      - OPENVPN_PASSWORD=SENUmx9Q9FrUYKbVmLQoz5gD
      - SERVER_COUNTRIES=Netherlands,Belgium
      - TZ=Europe/Brussels
    restart: unless-stopped

  # ------------------------------------------------------------------
  # SHARED DATABASE (Now routed through Gluetun)
  # ------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: vinted-redis-shared
    network_mode: "service:gluetun" # <-- Added so bots can talk to it via localhost
    restart: unless-stopped

  # ------------------------------------------------------------------
  # BOT INSTANCES
  # ------------------------------------------------------------------

  # Channel 1: #amd-gpu
  bot-amd-gpu:
    build: .
    container_name: bot-amd-gpu
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - VINTED_DOMAIN=be
      - SEARCH_QUERY=RX
      - MAX_PRICE=200
      - REDIS_HOST=127.0.0.1 # <-- Forces the bot to look at its shared localhost
      - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1511371187437965353/zjwUW9qqpyM5lbDGsOghYcSeutKOfOykq8Uxm8NnaCljv0BCZAGib98Ld3vAvy_hOLW5
    restart: unless-stopped

  # Channel 2: #nvidia-gpu
  bot-nvidia-gpu:
    build: .
    container_name: bot-nvidia-gpu
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - VINTED_DOMAIN=be
      - SEARCH_QUERY=RTX
      - MAX_PRICE=200
      - REDIS_HOST=127.0.0.1
      - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1511345609553219738/yA1b5sqRC0EZtgmohrOwBlX28fB5pcphPb2ugycZCg8b_LdvqcJuUCKD9ypYJCvNyT_V
    restart: unless-stopped

  # Channel 3: #amd-cpu
  bot-amd-cpu:
